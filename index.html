<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Energy Capital</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a1f3d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        .ad-wrapper {
            position: relative;
            max-width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .ad-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .apply-btn {
            position: absolute;
            bottom: 12%;
            left: 6%;
            background: linear-gradient(to right, #f4b400, #ffd700);
            color: #0a1f3d;
            padding: 18px 45px;
            font-size: clamp(18px, 2.6vw, 25px);
            font-weight: 700;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(244, 180, 0, 0.6);
            z-index: 10;
        }
        .apply-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(244, 180, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="ad-wrapper">
        <img src="ad.jpg" alt="Atlas Energy Capital Ad" class="ad-image">
        
        <!-- Only the button is active -->
        <a href="https://www.atlasenergycapital.com/" target="_blank" class="apply-btn">
            CLICK HERE TO APPLY NOW
        </a>
    </div>
</body>
</html>
